# responsible_ai/RAI_Config.yaml
# Mowafak AI Pre-Screening System - Responsible AI Configuration
# Version: 1.0.0
# Last Updated: 2024-01-15

# ============================================================================
# SYSTEM CLASSIFICATION
# ============================================================================
system:
  name: "Mowafak AI Pre-screen"
  version: "1.0.0"
  description: "Async voice pre-screening system with mandatory human review"
  risk_classification: "HIGH"  # Under NYC AEDT and EU AI Act
  jurisdiction: ["Egypt", "EU", "New York City"]

# ============================================================================
# MANDATORY RULES (No Exceptions)
# ============================================================================
mandatory_rules:

  human_review_required:
    rule_id: "RAI-001"
    rule: "MANDATORY_HR_REVIEW"
    description: >
      Every AI-generated assessment must be reviewed by a human HR professional
      before any candidate notification.
    enforcement: "ARCHITECTURE_LEVEL"
    verification: "Code review confirms no path from AI assessment to candidate notification without HR action"
    violation_severity: "CRITICAL"
    # FIX #9: corrected path — the actual test class is TestHiLCompliance in test_evaluator.py
    automated_test: "tests/test_evaluator.py::TestHiLCompliance::test_no_auto_reject_path"

  no_auto_reject:
    rule_id: "RAI-002"
    rule: "ZERO_AUTO_REJECT_PATHWAY"
    description: >
      The system architecture must make automatic candidate rejection impossible
      by design, not just unlikely.
    enforcement: "ARCHITECTURE_LEVEL"
    verification: "Static analysis confirms no auto-reject functions exist in codebase"
    violation_severity: "CRITICAL"
    # FIX #9: corrected path
    automated_test: "tests/test_evaluator.py::TestHiLCompliance::test_hil_score_perfect_on_compliant_cases"

  explicit_consent:
    rule_id: "RAI-003"
    rule: "EXPLICIT_CONSENT_REQUIRED"
    description: >
      Candidates must explicitly consent to AI assessment before any recording begins.
    enforcement: "UI_LEVEL"
    verification: "Consent button must be clicked before MediaRecorder API activates"
    violation_severity: "HIGH"
    consent_elements:
      - "AI transcription disclosure"
      - "Human review guarantee"
      - "Data retention period"
      - "Right to withdraw"
      - "Alternative process available"

  audit_trail_integrity:
    rule_id: "RAI-004"
    rule: "APPEND_ONLY_AUDIT_LOG"
    description: >
      All HR decisions must be logged in an append-only format with
      cryptographic signatures.
    enforcement: "CODE_LEVEL"
    verification: "No delete or update methods exist for audit log entries"
    violation_severity: "HIGH"
    automated_test: "tests/test_evaluator.py::TestHiLCompliance::test_audit_trail_complete"
    requirements:
      - "Sequential entry IDs"
      - "SHA-256 signatures"
      - "Hash chain linking"
      - "Exportable format (CSV/JSON)"
      - "Immutable storage"

  evidence_based_assessment:
    rule_id: "RAI-005"
    rule: "FAITHFULNESS_REQUIRED"
    description: >
      Every AI assessment claim must be supported by direct quotes from the
      candidate's transcript.
    enforcement: "CODE_LEVEL"
    verification: "Assessment validation rejects entries without evidence_from_transcript"
    violation_severity: "MEDIUM"
    automated_test: "tests/test_evaluator.py::TestFaithfulness::test_evidence_quotes_present"
    # FIX #10: aligned with the 0.8 threshold now enforced in test_evaluator.py
    minimum_threshold: 0.8

  pii_protection:
    rule_id: "RAI-006"
    rule: "NO_PII_IN_LOGS"
    description: >
      Error logs and system outputs must never contain candidate personally
      identifiable information.
    enforcement: "CODE_LEVEL"
    verification: "Logging system uses candidate_id only; redacts names, emails, phones"
    violation_severity: "MEDIUM"
    protected_fields:
      - "name"
      - "email"
      - "phone"
      - "address"
      - "transcript_content"

# ============================================================================
# BIAS AUDIT CONFIGURATION
# ============================================================================
bias_audit:
  enabled: true
  frequency: "QUARTERLY"
  methodology: "name_gender_accent_swapping"

  test_dimensions:
    - dimension: "name_origin"
      description: "Test if Egyptian vs Western names affect scoring"
      variants:
        egyptian_male:   ["Ahmed Hassan", "Mohamed Ali", "Omar Ibrahim"]
        egyptian_female: ["Mona Ibrahim",  "Fatima Ali",  "Nour Mohamed"]
        western_male:    ["John Smith",    "Michael Brown", "David Wilson"]
        western_female:  ["Emma Johnson",  "Olivia Williams", "Sophia Davis"]

    - dimension: "gender"
      description: "Test if gender affects scoring with identical answers"
      variants: ["male", "female"]

    - dimension: "accent"
      description: "Test if accent patterns affect transcription accuracy and scoring"
      variants: ["neutral", "cairene", "alexandrian", "upper_egypt"]

  thresholds:
    max_score_variance: 0.3
    max_gender_variance: 0.2
    max_ethnicity_variance: 0.25
    action_on_exceed: "IMMEDIATE_REVIEW_AND_RETRAINING"

  reporting:
    format: "JSON"
    retention: "PERMANENT"
    distribution:
      - "HR_LEAD"
      - "COMPLIANCE_OFFICER"
      - "AI_ETHICS_BOARD"

# ============================================================================
# EVALUATION METRICS
# ============================================================================
evaluation_metrics:

  faithfulness:
    metric_id: "MET-001"
    description: "Measures if AI assessments are grounded in actual transcript content"
    # FIX #10: raised to 0.8 to match the threshold enforced in test_evaluator.py
    threshold: 0.8
    enforcement: "AUTOMATED_TEST"
    test_file: "tests/test_evaluator.py::TestFaithfulness"

  hil_respect:
    metric_id: "MET-002"
    description: "Verifies no candidate-facing decision exists without HR action"
    threshold: 1.0  # Must be perfect — any violation is a CRITICAL failure
    enforcement: "AUTOMATED_TEST"
    test_file: "tests/test_evaluator.py::TestHiLCompliance"

  bias_variance:
    metric_id: "MET-003"
    description: "Maximum score difference for identical answers with different names"
    threshold: 0.3
    enforcement: "QUARTERLY_AUDIT"
    test_file: "tests/test_evaluator.py::TestBiasAudit"

  technical_accuracy:
    metric_id: "MET-004"
    description: "Accuracy of technical skill assessment"
    threshold: 0.75
    enforcement: "CONTINUOUS_MONITORING"

# ============================================================================
# DATA GOVERNANCE
# ============================================================================
data_governance:

  retention_policies:
    audio_recordings:
      duration_days: 30
      rationale: "Needed for transcription verification and quality checks"
      auto_delete: true

    transcripts:
      duration_days: 90
      rationale: "Required for HR review and candidate appeals"
      auto_delete: true

    assessment_reports:
      duration_days: 365
      rationale: "Needed for audit and compliance"
      auto_delete: true

    audit_logs:
      duration_days: -1   # Permanent — never auto-deleted
      rationale: "Required for legal compliance and audit trail integrity"
      auto_delete: false

  access_control:
    hr_team:
      level: "FULL"
      scope: "All candidate data for their requisitions"

    candidates:
      level: "OWN_DATA_ONLY"
      scope: "Only their own recordings, transcripts, and assessments"

    ai_engineers:
      level: "ANONYMIZED_ONLY"
      scope: "De-identified data for system improvement"

    auditors:
      level: "READ_ONLY"
      scope: "Audit logs and bias reports"

  encryption:
    at_rest: "AES-256-GCM"
    in_transit: "TLS-1.3"
    key_rotation: "90_DAYS"

  # FIX #8: completed the truncated data_deletion section
  data_deletion:
    candidate_request:
      description: >
        Candidates may request deletion of their personal data at any time
        prior to a final HR decision being logged.
      scope:
        - "audio_recordings"
        - "transcripts"
        - "assessment_reports"
      excluded:
        - "audit_logs"   # Append-only; excluded from deletion per RAI-004
      process: "Submit request via HR portal; fulfilled within 30 days (GDPR Art. 17)"
      verification: "Deletion confirmed by HR lead and logged in audit trail"

    post_retention_purge:
      description: >
        Automated deletion of data that has exceeded its retention period.
      trigger: "Scheduled job runs nightly; checks duration_days for each data type"
      verification: "Deletion events written to audit_log.jsonl with type=AUTO_PURGE"
      exceptions:
        - "Data subject to active legal hold"
        - "Data referenced in an open compliance investigation"

    right_to_erasure:
      regulation: "GDPR Article 17"
      applies_to: ["audio_recordings", "transcripts", "assessment_reports"]
      does_not_apply_to: ["audit_logs"]
      rationale: >
        Audit logs constitute a legal record of HR decisions and are exempt
        from erasure under GDPR Art. 17(3)(b) (legal obligation) and
        Art. 17(3)(e) (legal claims).

# ============================================================================
# INCIDENT RESPONSE
# ============================================================================
incident_response:

  hil_violation:
    severity: "CRITICAL"
    trigger: "Any candidate notification sent without logged HR decision"
    immediate_actions:
      - "Suspend affected pipeline instance"
      - "Notify HR Lead and Compliance Officer within 1 hour"
      - "Preserve all logs for investigation"
      - "Notify affected candidates within 72 hours (GDPR Art. 34)"
    post_incident:
      - "Root cause analysis within 5 business days"
      - "Architecture review to close the gap"
      - "Re-run full test suite before redeployment"

  bias_threshold_exceeded:
    severity: "HIGH"
    trigger: "Bias audit reports max_variance > 0.3 for any dimension"
    immediate_actions:
      - "Pause use of affected evaluator version"
      - "Notify AI Ethics Board"
      - "Flag all assessments generated since last clean audit for HR re-review"
    post_incident:
      - "Prompt engineering review within 3 business days"
      - "Retrain or fine-tune with balanced dataset if systematic bias confirmed"
      - "Re-audit before resuming production use"

  pii_leak:
    severity: "HIGH"
    trigger: "PII detected in error logs or exported reports"
    immediate_actions:
      - "Rotate affected log destinations"
      - "Redact leaked entries"
      - "Assess whether breach notification required under GDPR Art. 33"