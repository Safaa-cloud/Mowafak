<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mowafak — Candidate Application</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens (Matching record.html) ── */
    :root {
      --navy:   #0a0f2c;
      --blue:   #0047ff;
      --ice:    #dce9ff;
      --mid:    #6b7db3;
      --white:  #ffffff;
      --danger: #e03131;
      --green:  #2f9e44;
      --card-bg: rgba(255,255,255,0.06);
      --border:  rgba(255,255,255,0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,71,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,71,255,0.10) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      padding: 40px 20px;
    }

    .wordmark {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }
    .wordmark-icon {
      width: 40px; height: 40px;
      background: var(--blue);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 20px;
    }
    .wordmark-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--white);
      letter-spacing: -0.5px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 35px 32px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--mid);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }
    .form-control {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      color: var(--white);
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: var(--blue);
    }
    .form-control::placeholder {
      color: rgba(255,255,255,0.3);
    }

    input[type="file"] {
      padding: 10px;
      font-size: 0.9rem;
    }

    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 25px;
      margin-bottom: 25px;
    }
    .consent-row input {
      margin-top: 4px;
      width: 18px; height: 18px;
      accent-color: var(--blue);
      cursor: pointer;
    }
    .consent-row label {
      font-size: 0.9rem;
      color: var(--ice);
      line-height: 1.4;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      background: var(--blue);
      color: var(--white);
      border: none;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0,71,255,0.4);
    }
    .btn:hover:not(:disabled) {
      box-shadow: 0 6px 28px rgba(0,71,255,0.55);
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    #statusMessage {
      margin-top: 15px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--ice);
    }

    /* Fade-in animation */
    .fade-in { animation: fadeIn .45s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="shell fade-in">
  <div class="wordmark">
    <div class="wordmark-icon">🤝</div>
    <div class="wordmark-text">Mowafak</div>
  </div>

  <div class="card">
    <h2>Apply & Start Interview</h2>
    
    <form id="applyForm">
      <div class="form-group">
        <label for="candName">Full Name</label>
        <input type="text" id="candName" class="form-control" placeholder="E.g., Safaa Mohamed" required>
      </div>

      <div class="form-group">
        <label for="candEmail">Email Address</label>
        <input type="email" id="candEmail" class="form-control" placeholder="safaa@example.com" required>
      </div>

      <div class="form-group">
        <label for="cvFile">Upload CV (PDF Only)</label>
        <input type="file" id="cvFile" class="form-control" accept="application/pdf" required>
      </div>

      <div class="consent-row">
        <input type="checkbox" id="consentCheck" required>
        <label for="consentCheck">I agree to the AI processing of my resume to generate personalized interview questions.</label>
      </div>

      <button type="submit" id="submitBtn" class="btn" disabled>Submit & Continue ➔</button>
      <div id="statusMessage"></div>
    </form>
  </div>
</div>

<script>
  const BACKEND_URL = "http://localhost:8001";
  
  const form = document.getElementById('applyForm');
  const consentCheck = document.getElementById('consentCheck');
  const submitBtn = document.getElementById('submitBtn');
  const statusMessage = document.getElementById('statusMessage');

  // Enable button only if consent is checked
  consentCheck.addEventListener('change', () => {
    submitBtn.disabled = !consentCheck.checked;
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fileInput = document.getElementById('cvFile');
    if (!fileInput.files[0]) return;

    // UI Loading State
    submitBtn.disabled = true;
    submitBtn.innerText = "Processing CV... ⏳";
    statusMessage.innerText = "The AI is analyzing your resume to tailor your questions...";
    statusMessage.style.color = "#74c0fc"; // Light blue

    // Prepare data for FastAPI exactly as it expects it
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("name", document.getElementById('candName').value);
    formData.append("email", document.getElementById('candEmail').value);
    formData.append("consent_accepted", consentCheck.checked);

    try {
      const response = await fetch(`${BACKEND_URL}/upload_cv`, {
        method: "POST",
        body: formData
      });

      const result = await response.json();

      if (response.ok) {
        statusMessage.innerText = "Success! Redirecting to Interview Room...";
        statusMessage.style.color = "#69db7c"; // Green
        
        // 🚀 THE MAGIC: Redirects to record.html with the new Session ID
        setTimeout(() => {
          window.location.href = `record.html?session_id=${result.session_id}`;
        }, 1000);
      } else {
        throw new Error(result.detail || "Upload failed.");
      }
    } catch (error) {
      console.error(error);
      submitBtn.disabled = false;
      submitBtn.innerText = "Submit & Continue ➔";
      statusMessage.innerText = `❌ Error: ${error.message}. Is main.py running?`;
      statusMessage.style.color = "#ff8080"; // Red
    }
  });
</script>

</body>
</html>
